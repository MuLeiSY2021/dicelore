var clusters=[...new Set(DATA.file.nodes.map(function(n){return n.cluster}))].sort();
var clusterColor={};clusters.forEach(function(c,i){clusterColor[c]="hsl("+Math.round(360*i/clusters.length)+",62%,58%)";});
var maxDeg=Math.max(1,...DATA.file.nodes.map(function(n){return n.deg}));
function heat(d){var t=Math.pow(d/maxDeg,0.6);function L2(a,b){return Math.round(a+(b-a)*t);}return "rgb("+L2(232,178)+","+L2(232,34)+","+L2(232,34)+")";}
var dirGroups={};Object.keys(DATA.palette).forEach(function(k){dirGroups[k]={color:{background:DATA.palette[k],border:"#fff"},font:{color:"#222"}}});
var container=document.getElementById("net");var network=null;var mode="dir";var colorMode="mod";var physics=true;var nodesDS=null,edgesDS=null,stashN={},stashE={};
function colorOf(n){if(colorMode==="mod")return clusterColor[n.cluster];if(colorMode==="pkg")return DATA.palette[n.pkg]||"#999";return heat(n.deg);}
function fileNodes(){return DATA.file.nodes.map(function(n){return Object.assign({},n,{color:{background:colorOf(n),border:"#fff"},value:n.deg+1});});}
function opts(){return{groups:dirGroups,nodes:{shape:"dot",scaling:{min:7,max:46},font:{size:12}},edges:{arrows:{to:{enabled:true,scaleFactor:.45}},smooth:{type:"continuous"},scaling:{min:1,max:8}},physics:{enabled:physics,barnesHut:{gravitationalConstant:-9000,springLength:150,springConstant:.04,avoidOverlap:.5},stabilization:{iterations:240}},interaction:{hover:true,tooltipDelay:120,multiselect:true}};}
function updCount(){document.getElementById("bRestore").textContent="恢复全部 ("+Object.keys(stashN).length+")";}
function hideNode(id){if(id==null||stashN[id])return;var n=nodesDS.get(id);if(!n)return;stashN[id]=n;network.getConnectedEdges(id).forEach(function(eid){if(!stashE[eid]){var e=edgesDS.get(eid);if(e){stashE[eid]=e;edgesDS.remove(eid);}}});nodesDS.remove(id);updCount();}
function restoreAll(){var ns=Object.values(stashN),es=Object.values(stashE);stashN={};stashE={};if(ns.length)nodesDS.add(ns);if(es.length)edgesDS.add(es);updCount();}
function isolate(cluster){DATA.file.nodes.forEach(function(n){if(n.cluster!==cluster)hideNode(n.id);});}
function draw(){var d=DATA[mode];var nodes=mode==="file"?fileNodes():d.nodes;stashN={};stashE={};nodesDS=new vis.DataSet(nodes);edgesDS=new vis.DataSet(d.edges);updCount();if(network){network.setData({nodes:nodesDS,edges:edgesDS});network.setOptions(opts());}else{network=new vis.Network(container,{nodes:nodesDS,edges:edgesDS},opts());network.on("oncontext",function(p){p.event.preventDefault();var id=network.getNodeAt(p.pointer.DOM);if(id!=null)hideNode(id);});}legend();}
function legend(){var el=document.getElementById("legpanel");var h="";if(mode==="file"&&colorMode==="mod"){h+="<h4>模块 ("+clusters.length+") · 点击只看该簇</h4>";var cnt={};DATA.file.nodes.forEach(function(n){cnt[n.cluster]=(cnt[n.cluster]||0)+1;});clusters.forEach(function(c){h+='<div class="row" data-c="'+c+'"><span class="sw" style="background:'+clusterColor[c]+'"></span>'+c+" ("+cnt[c]+")</div>";});}else if(mode==="file"&&colorMode==="heat"){h+="<h4>被依赖热度</h4><div class=row><span class=sw style=\"background:rgb(232,232,232)\"></span>少</div><div class=row><span class=sw style=\"background:rgb(178,34,34)\"></span>多 (max "+maxDeg+")</div><div style=\"margin-top:6px;color:#999\">节点越大=被依赖越多</div>";}else{h+="<h4>包</h4>";Object.keys(DATA.palette).forEach(function(k){h+='<div class="row"><span class="sw" style="background:'+DATA.palette[k]+'"></span>'+k+"</div>";});}el.innerHTML=h;el.querySelectorAll(".row[data-c]").forEach(function(r){r.onclick=function(){isolate(r.getAttribute("data-c"));};});}
draw();
function setMode(m){mode=m;document.getElementById("bDir").classList.toggle("on",m==="dir");document.getElementById("bFile").classList.toggle("on",m==="file");draw();}
function setColor(c){colorMode=c;["cMod","cPkg","cHeat"].forEach(function(id){document.getElementById(id).classList.remove("on");});document.getElementById(c==="mod"?"cMod":c==="pkg"?"cPkg":"cHeat").classList.add("on");if(mode!=="file")setMode("file");else draw();}
document.getElementById("bDir").onclick=function(){setMode("dir");};
document.getElementById("bFile").onclick=function(){setMode("file");};
document.getElementById("cMod").onclick=function(){setColor("mod");};

document.getElementById("cHeat").onclick=function(){setColor("heat");};
